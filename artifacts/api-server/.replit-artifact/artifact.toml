kind = "api"
previewPath = "/api" # TODO - should be excluded from preview in the first place
title = "API Server"
version = "1.0.0"
id = "3B4_FFSkEVBkAeYMFRJ2e"

[[services]]
localPort = 8080
name = "API Server"
paths = ["/api"]

[services.development]
run = "cd python && python main.py"

[services.production]

[services.production.build]
args = ["echo", "no-build"]

[services.production.build.env]
NODE_ENV = "production"

[services.production.run]
args = ["python", "artifacts/api-server/python/main.py"]

[services.production.run.env]
PORT = "8080"
NODE_ENV = "production"

[services.production.health.startup]
path = "/api/healthz"
